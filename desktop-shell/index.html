<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tokenometer Desktop</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #081018;
        color: #e6eef6;
        font-family: Inter, Segoe UI, Arial, sans-serif;
      }
      main {
        width: min(560px, calc(100vw - 48px));
        padding: 28px;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 12px;
        background: rgba(16, 24, 36, 0.92);
      }
      h1 { margin: 0 0 8px; font-size: 24px; }
      p { margin: 0 0 12px; line-height: 1.5; color: #b7c4d4; }
      a {
        color: #7dd3fc;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Tokenometer Desktop</h1>
      <p>This desktop shell opens the hosted Tokenometer web app.</p>
      <p>If the cloud app does not load, check your internet connection or open <a href="https://www.tokenometer.cloud">tokenometer.cloud</a> in your browser.</p>
    </main>
  </body>
</html>
